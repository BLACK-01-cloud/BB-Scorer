<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@300;400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .glass-blur {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        @keyframes sweep {
            0% { transform: translateX(-100%) skewX(-15deg); opacity: 0; }
            20% { opacity: 0.4; }
            50% { opacity: 0.4; }
            80% { opacity: 0; }
            100% { transform: translateX(200%) skewX(-15deg); opacity: 0; }
        }

        .sweep-effect::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 30%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 179, 172, 0.2), transparent);
            transform: skewX(-15deg);
            animation: sweep 4s infinite ease-in-out;
        }

        .orange-glow {
            box-shadow: 0 0 25px -5px rgba(196, 0, 25, 0.4), 0 0 15px -5px rgba(234, 195, 36, 0.3);
        }
    </style>

          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary-fixed": "#7df4ff",
                      "on-secondary-fixed": "#410003",
                      "on-background": "#dce4e5",
                      "outline-variant": "#3b494b",
                      "inverse-on-surface": "#2a3233",
                      "on-primary": "#00363a",
                      "surface": "#0d1515",
                      "on-tertiary-fixed": "#231b00",
                      "on-surface": "#dce4e5",
                      "tertiary-fixed-dim": "#eac324",
                      "secondary-fixed-dim": "#ffb3ac",
                      "tertiary-container": "#fed639",
                      "surface-container-highest": "#2e3637",
                      "on-error-container": "#ffdad6",
                      "on-surface-variant": "#b9cacb",
                      "primary-fixed-dim": "#00dbe9",
                      "error-container": "#93000a",
                      "on-tertiary": "#3b2f00",
                      "background": "#0d1515",
                      "on-tertiary-fixed-variant": "#554500",
                      "surface-tint": "#00dbe9",
                      "secondary": "#ffb3ac",
                      "surface-container-low": "#151d1e",
                      "on-primary-fixed": "#002022",
                      "secondary-fixed": "#ffdad6",
                      "on-secondary": "#680008",
                      "surface-dim": "#0d1515",
                      "secondary-container": "#c40019",
                      "primary-container": "#00f0ff",
                      "outline": "#849495",
                      "on-secondary-fixed-variant": "#930010",
                      "on-primary-fixed-variant": "#004f54",
                      "error": "#ffb4ab",
                      "tertiary-fixed": "#ffe179",
                      "surface-container": "#192122",
                      "surface-container-lowest": "#080f10",
                      "inverse-surface": "#dce4e5",
                      "inverse-primary": "#006970",
                      "primary": "#dbfcff",
                      "surface-bright": "#333b3b",
                      "on-secondary-container": "#ffd2cd",
                      "surface-container-high": "#232b2c",
                      "surface-variant": "#2e3637",
                      "on-primary-container": "#006970",
                      "on-error": "#690005",
                      "tertiary": "#fff5de",
                      "on-tertiary-container": "#715d00"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "lg": "32px",
                      "md": "20px",
                      "touch-target": "44px",
                      "base": "4px",
                      "xs": "8px",
                      "xl": "48px",
                      "sm": "12px"
              },
              "fontFamily": {
                      "h1": ["Space Grotesk"],
                      "body-lg": ["Inter"],
                      "label-caps": ["Space Grotesk"],
                      "stat-number": ["Space Grotesk"],
                      "h2": ["Space Grotesk"],
                      "score-display": ["Space Grotesk"],
                      "body-md": ["Inter"]
              },
              "fontSize": {
                      "h1": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                      "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "700"}],
                      "stat-number": ["20px", {"lineHeight": "1.0", "fontWeight": "500"}],
                      "h2": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],

              }
            },
          },
        }

</head>
<body class="bg-background text-on-background min-h-screen font-body-md selection:bg-primary-container/30">
<!-- Header (Shared Component Mapping) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-3 max-w-full bg-neutral-950/80 backdrop-blur-md border-b border-neutral-800 shadow-[0_0_15px_rgba(0,240,255,0.1)]">
<div class="flex items-center gap-2 text-xl font-black text-cyan-400 tracking-tighter">
<span class="material-symbols-outlined text-cyan-400">sports_basketball</span>
<span class="font-h1 text-h2">BB Score</span>
</div>
<div class="flex gap-6">
<button class="font-space-grotesk uppercase tracking-widest text-sm font-bold text-cyan-400 border-b-2 border-cyan-400 hover:text-cyan-300 transition-colors">LIVE</button>
<button class="font-space-grotesk uppercase tracking-widest text-sm font-bold text-neutral-500 hover:text-cyan-300 transition-colors">SCHEDULE</button>
</div>
<button class="material-symbols-outlined text-neutral-500 hover:text-cyan-300 transition-all">settings_brightness</button>
</header>
<!-- Main Content Canvas (Background Context) -->
<main class="pt-24 pb-32 px-4 max-w-7xl mx-auto">
<!-- Dashboard Background Visuals -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 opacity-40 grayscale">
<div class="bg-surface-container h-64 rounded-xl border border-outline-variant/30 p-6 flex flex-col justify-end">
<div class="text-label-caps mb-2 text-outline">MATCH ANALYSIS</div>
<div class="h-2 w-full bg-outline-variant/20 rounded-full mb-1"></div>
<div class="h-2 w-2/3 bg-outline-variant/20 rounded-full"></div>
</div>
<div class="bg-surface-container h-64 rounded-xl border border-outline-variant/30 overflow-hidden">
<img class="w-full h-full object-cover" data-alt="A wide panoramic digital scoreboard background featuring abstract data visualizations and blurred basketball court lines. The image is dominated by deep obsidian and dark charcoal tones with glowing cyan and crimson accents reflecting off a polished surface. The atmosphere is high-tech, sleek, and cinematic, perfectly capturing the intensity of a professional midnight arena game." src="https://lh3.googleusercontent.com/aida/ADBb0ujXnI9ZlBWhWKkyvzFZZIdQLbtzGX4f6vWWgMygYXRBYpye3bgaK7whYJRyqbwW0rBOGL1aPBLsejtBs_YtwkMKVt2gBUpgXCupztprl2f0Vp2FvQTpVuDV3LvzYyAbx_psYF-_PCMOv_4UE4hfx0zNGo_ozuD6sQeh5j6t1ZWuVvv484ulLBYMkjN_6ui0vHgl9h_koFFVCGLojc18ONdOSLa3G5DCVPWYIqe2OuL1V3XfGZstOmeSYiFwlG3sJUVUpSnYuMXQIQ"/>
</div>
<div class="bg-surface-container h-64 rounded-xl border border-outline-variant/30 p-6 flex items-center justify-center">
<span class="material-symbols-outlined text-6xl text-outline/20">analytics</span>
</div>
</div>
</main>
<!-- BasketballScoreFlashNotification Component -->
<div class="fixed bottom-12 left-1/2 -translate-x-1/2 z-[100] w-[90%] md:w-[540px] transform transition-all duration-700 ease-out translate-y-0 opacity-100">
<div class="relative overflow-hidden glass-blur bg-neutral-950/80 border border-secondary-fixed-dim/30 rounded-2xl orange-glow sweep-effect p-sm flex items-center gap-md">
<!-- Left: Avatar Section -->
<div class="relative flex-shrink-0">
<div class="w-16 h-16 rounded-full border-2 border-secondary overflow-hidden bg-surface-container-highest">
<img class="w-full h-full object-cover" data-alt="A close-up high-resolution profile portrait of a focused professional basketball player in a golden-yellow jersey. The lighting is dramatic and moody, coming from the side to highlight athletic features, set against a dark, out-of-focus arena background. The visual style is premium sports photography with a cinematic feel, using warm golden highlights and deep shadows." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDHoyLImpvRK4JV_wFoworGHSl41Otm6fICFL2rJ0motEUw2iyrCNy6Xwo3IROPz5o4ObykXqMvocuIvSEp8mLE8ljfQ9s65ZSnPr7NbejgEML_E-hCI37DbHdPzfJpbj6e0u4uE7yeTQLLz_IBofdVs_ecbDVlZ_H32FIvQJBHnLpiWNE3TVUZF6NDpwMTeb1ZmEBBx_IdcBbxtkYgFJXArD0BjIcy8mKeS_IkIyFrBxhg-aU_wtck4prW3xIaGpiCvgtVSImHtos"/>
</div>
<!-- Team Logo Badge -->
<div class="absolute -bottom-1 -right-1 w-7 h-7 rounded-full bg-surface-container border border-outline shadow-xl flex items-center justify-center">
<span class="material-symbols-outlined text-secondary-fixed-dim text-lg" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
</div>
<!-- Center: Event Info -->
<div class="flex-grow min-w-0">
<div class="flex items-center gap-xs">
<span class="font-h1 text-[18px] text-tertiary-container tracking-wider uppercase">3PT MADE</span>
<span class="w-2 h-2 rounded-full bg-secondary-container animate-pulse"></span>
</div>
<div class="font-stat-number text-on-surface truncate">#30 Stephen Curry</div>
<div class="font-label-caps text-on-surface-variant/70 flex items-center gap-1">
                    GSW <span class="w-1 h-1 rounded-full bg-outline-variant"></span> Q3 04:21
                </div>
</div>
<!-- Right: Score Info -->
<div class="flex flex-col items-end gap-1 flex-shrink-0 pr-2">
<div class="bg-secondary-container text-on-secondary-container px-3 py-0.5 rounded-full font-h1 text-[14px] shadow-lg">
                    +3
                </div>
<div class="flex items-baseline gap-2">
<span class="font-label-caps text-neutral-500">LAL</span>
<span class="font-stat-number text-h2 text-neutral-200">86</span>
<span class="text-outline-variant">-</span>
<span class="font-stat-number text-h2 text-secondary-fixed-dim">89</span>
<span class="font-label-caps text-secondary-fixed-dim">GSW</span>
</div>
</div>
</div>
</div>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-neutral-950/90 backdrop-blur-xl border-t border-neutral-800 shadow-[0_-4px_20px_rgba(0,0,0,0.5)]">
<a class="flex flex-col items-center justify-center bg-cyan-500/10 text-cyan-400 rounded-lg py-1 px-3 shadow-[inset_0_0_8px_rgba(0,240,255,0.2)]" href="#">
<span class="material-symbols-outlined">scoreboard</span>
<span class="font-space-grotesk text-[10px] font-medium uppercase tracking-tighter">Live Scores</span>
</a>
<a class="flex flex-col items-center justify-center text-neutral-500 py-1 px-3 hover:text-neutral-200 transition-all" href="#">
<span class="material-symbols-outlined">edit_square</span>
<span class="font-space-grotesk text-[10px] font-medium uppercase tracking-tighter">Scorer</span>
</a>
<a class="flex flex-col items-center justify-center text-neutral-500 py-1 px-3 hover:text-neutral-200 transition-all" href="#">
<span class="material-symbols-outlined">groups</span>
<span class="font-space-grotesk text-[10px] font-medium uppercase tracking-tighter">Matches</span>
</a>
<a class="flex flex-col items-center justify-center text-neutral-500 py-1 px-3 hover:text-neutral-200 transition-all" href="#">
<span class="material-symbols-outlined">admin_panel_settings</span>
<span class="font-space-grotesk text-[10px] font-medium uppercase tracking-tighter">Admin</span>
</a>
</nav>
</body></html>
